name: Finalize MMOmon Discord card v6

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/finalize-social-card-v6.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update social metadata
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          old = 'https://mmomon.com/assets/mmomon-discord-card-hq-v5.png'
          new = 'https://mmomon.com/assets/mmomon-discord-card-hq-v6.jpg'

          index = Path('index.html')
          html = index.read_text(encoding='utf-8')
          if old not in html:
              raise SystemExit('Expected v5 social image URL was not found')
          html = html.replace(old, new)
          html = html.replace('content="image/png"', 'content="image/jpeg"', 1)
          html = html.replace('content="2026-07-14T03:55:00Z"', 'content="2026-07-15T05:00:00Z"')
          html = html.replace('"dateModified": "2026-07-13"', '"dateModified": "2026-07-15"')
          index.write_text(html, encoding='utf-8')

          sitemap = Path('sitemap.xml')
          xml = sitemap.read_text(encoding='utf-8')
          if old not in xml:
              raise SystemExit('Expected v5 sitemap image URL was not found')
          xml = xml.replace(old, new)
          xml = xml.replace('<lastmod>2026-07-14</lastmod>', '<lastmod>2026-07-15</lastmod>')
          sitemap.write_text(xml, encoding='utf-8')
          PY

      - name: Commit and clean workflow
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm -f .github/workflows/finalize-social-card-v6.yml
          git add index.html sitemap.xml
          git commit -m 'Use corrected full-quality MMOmon Discord card'
          git push
