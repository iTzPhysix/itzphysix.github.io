name: Finalize MMOmon social card v5

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/finalize-social-card-v5.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Point metadata to high-resolution image
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          old = 'https://mmomon.com/assets/mmomon-discord-card-v4.png'
          new = 'https://mmomon.com/assets/mmomon-discord-card-hq-v5.png'

          index = Path('index.html')
          html = index.read_text(encoding='utf-8')
          if old not in html:
              raise SystemExit('Expected v4 image URL was not found in index.html')
          html = html.replace(old, new)
          html = html.replace('content="2026-07-13T22:45:00Z"', 'content="2026-07-14T03:55:00Z"')
          html = html.replace('<meta property="og:image:width" content="600">', '<meta property="og:image:width" content="1200">')
          html = html.replace('<meta property="og:image:height" content="315">', '<meta property="og:image:height" content="630">')
          html = html.replace('"width": 600,\n          "height": 315', '"width": 1200,\n          "height": 630')
          index.write_text(html, encoding='utf-8')

          sitemap = Path('sitemap.xml')
          xml = sitemap.read_text(encoding='utf-8')
          xml = xml.replace('https://mmomon.com/assets/mmomon-discord-card-v4.png', new)
          xml = xml.replace('<lastmod>2026-07-13</lastmod>', '<lastmod>2026-07-14</lastmod>')
          sitemap.write_text(xml, encoding='utf-8')
          PY

      - name: Remove temporary files and commit
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm -f assets/placeholder.txt || true
          git rm -f .github/workflows/render-mmomon-social-card.yml || true
          git rm -f .github/workflows/finalize-social-card-v5.yml || true
          git add index.html sitemap.xml
          git commit -m 'Use high-resolution MMOmon Discord preview'
          git push
