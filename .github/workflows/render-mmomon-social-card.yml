name: Render MMOmon social card

on:
  push:
    branches: [main]
    paths:
      - assets/mmomon-discord-card-hq-v5.svg
      - .github/workflows/render-mmomon-social-card.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install SVG renderer
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends librsvg2-bin

      - name: Render and validate PNG
        run: |
          set -euo pipefail
          rsvg-convert \
            --format=png \
            --width=1200 \
            --height=630 \
            assets/mmomon-discord-card-hq-v5.svg \
            --output=assets/mmomon-discord-card-hq-v5.png

          python3 - <<'PY'
          from pathlib import Path
          import struct

          path = Path('assets/mmomon-discord-card-hq-v5.png')
          data = path.read_bytes()
          if data[:8] != b'\x89PNG\r\n\x1a\n':
              raise SystemExit('Rendered file is not a PNG')
          width, height = struct.unpack('>II', data[16:24])
          if (width, height) != (1200, 630):
              raise SystemExit(f'Unexpected dimensions: {width}x{height}')
          print(f'Validated {path}: {width}x{height}, {len(data)} bytes')
          PY

      - name: Commit rendered PNG
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/mmomon-discord-card-hq-v5.png
          if git diff --cached --quiet; then
            echo 'Rendered PNG already current.'
            exit 0
          fi
          git commit -m 'Publish high-resolution MMOmon social card'
          git push
